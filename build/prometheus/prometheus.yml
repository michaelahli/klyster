# Prometheus configuration for Klyster
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Klyster metrics
  - job_name: 'klyster'
    static_configs:
      - targets: ['klyster:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
