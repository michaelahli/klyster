# Klyster Configuration for PostgreSQL
# Use this for production deployments with PostgreSQL

[database]
db_type = "postgres"
postgres_url = "${KLYSTER_DATABASE__POSTGRES_URL}"
pool_size = 20
wal_mode = false

[web]
host = "0.0.0.0"
port = 8080
workers = 4

[agent]
enabled = false
collection_interval_secs = 60

[analytics]
enabled = false
grpc_endpoint = "http://localhost:50051"

[logging]
level = "info"
format = "json"
outputs = ["stdout"]

[telemetry]
enabled = false
otlp_endpoint = ""

[metrics]
enabled = true
prometheus_port = 8080

[retention]
metrics_days = 30
forecasts_days = 90
recommendations_days = 180
