<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klyster - Capacity Planning</title>
  <link rel="stylesheet" href="/dist/styles.css">
</head>
<body class="font-sans antialiased">
  <div id="app" class="flex h-screen">
    <!-- Mobile menu button -->
    <button id="mobile-menu-btn" class="fixed top-4 left-4 z-50 md:hidden bg-gray-900 text-white p-2 rounded">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <!-- Sidebar backdrop -->
    <div id="sidebar-backdrop" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static w-64 bg-gray-900 text-white flex flex-col h-full z-50 transform -translate-x-full md:translate-x-0 transition-transform">
      <div class="p-4 border-b border-gray-800">
        <h1 class="text-xl font-bold">Klyster</h1>
      </div>
      <nav class="flex-1 p-4">
        <a href="#/" class="nav-link block py-2 px-3 rounded hover:bg-gray-800">Dashboard</a>
        <a href="#/resources" class="nav-link block py-2 px-3 rounded hover:bg-gray-800">Resources</a>
        <a href="#/forecasts" class="nav-link block py-2 px-3 rounded hover:bg-gray-800">Forecasts</a>
        <a href="#/recommendations" class="nav-link block py-2 px-3 rounded hover:bg-gray-800">Recommendations</a>
        <a href="#/analytics" class="nav-link block py-2 px-3 rounded hover:bg-gray-800">Analytics</a>
        <a href="#/settings" class="nav-link block py-2 px-3 rounded hover:bg-gray-800">Settings</a>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="flex-1 flex flex-col">
      <!-- Top bar -->
      <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 p-4 flex justify-between items-center">
        <h2 id="page-title" class="text-2xl font-semibold text-gray-900 dark:text-white">Dashboard</h2>
        <div>
          <button id="theme-toggle" class="px-3 py-2 rounded hover:bg-gray-100 dark:hover:bg-gray-700">🌙</button>
        </div>
      </header>

      <!-- Page content -->
      <div id="content" class="flex-1 overflow-auto p-6 bg-gray-50 dark:bg-gray-900">
        <!-- Dynamic content -->
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/forecasts.js"></script>
  <script src="/js/recommendations.js"></script>
  <script src="/js/sources.js"></script>
  <script src="/js/resources.js"></script>
  <script src="/js/analytics.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
