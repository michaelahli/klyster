global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'klyster-dev'
    environment: 'development'

scrape_configs:
  # Klyster application metrics (will be available in M2)
  - job_name: 'klyster'
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          component: 'klyster-app'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # PostgreSQL metrics (using postgres_exporter - optional)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
