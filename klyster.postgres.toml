# Klyster Configuration Example (PostgreSQL)
# Copy this file to klyster.toml and adjust as needed

[database]
db_type = "postgres"
postgres_url = "postgresql://klyster:klyster_dev_password@localhost:5432/klyster"
pool_size = 10
wal_mode = false  # Not applicable for PostgreSQL

[web]
host = "0.0.0.0"
port = 8080
workers = 4

[agent]
enabled = true
collection_interval_secs = 60

[analytics]
enabled = true
grpc_endpoint = "http://localhost:50051"

[logging]
level = "info"
format = "json"  # Options: json, text, logfmt

# Multiple log outputs (will be fully implemented in M2)
[[logging.outputs]]
type = "stdout"
format = "json"

# [logging.outputs]
# type = "file"
# path = "/var/log/klyster/app.log"
# format = "json"

[telemetry]
enabled = true
exporter = "otlp"  # Options: otlp, jaeger, zipkin, stdout
endpoint = "http://localhost:4317"
sample_rate = 1.0  # 100% sampling for development

[metrics]
enabled = true
endpoint = "0.0.0.0:9090"
prefix = "klyster"

[retention]
metrics_days = 30
forecasts_days = 90
recommendations_days = 180
audit_logs_days = 365
