version: '3.8'

services:
  # ===========================================================================
  # Klyster Application (add to existing services)
  # ===========================================================================
  klyster:
    build:
      context: .
      dockerfile: Dockerfile
    image: klyster/klyster:latest
    container_name: klyster
    ports:
      - "8080:8080"      # Web API
      - "9091:9091"      # Metrics (Prometheus)
    environment:
      - LOG_LEVEL=info
      - AUTO_MIGRATE=true
      - RUST_BACKTRACE=1
    volumes:
      - klyster_data:/data
      - klyster_logs:/var/log/klyster
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - klyster-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # Prometheus - depends on klyster now
  # ===========================================================================
  prometheus:
    depends_on:
      - klyster

# =============================================================================
# Volumes
# =============================================================================
volumes:
  klyster_data:
  klyster_logs: