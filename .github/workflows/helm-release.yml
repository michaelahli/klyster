name: Helm Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  publish:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages-deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" deploy/helm/klyster/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" deploy/helm/klyster/Chart.yaml

      - name: Lint chart
        run: helm lint deploy/helm/klyster

      - name: Package chart
        id: package
        run: |
          mkdir -p .cr-release-packages
          helm package deploy/helm/klyster --destination .cr-release-packages
          CHART_PACKAGE="$(find .cr-release-packages -name 'klyster-*.tgz' -print -quit)"
          echo "chart_package=${CHART_PACKAGE}" >> "$GITHUB_OUTPUT"

      - name: Resolve OCI namespace
        id: oci
        run: |
          OWNER="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "registry=ghcr.io" >> "$GITHUB_OUTPUT"
          echo "namespace=${OWNER}/charts" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR for Helm OCI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ steps.oci.outputs.registry }} --username "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR OCI
        run: helm push "${{ steps.package.outputs.chart_package }}" "oci://${{ steps.oci.outputs.registry }}/${{ steps.oci.outputs.namespace }}"

      - name: Upload chart to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .cr-release-packages/*.tgz
          draft: false
          prerelease: false

      - name: Checkout gh-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Prepare Helm repository
        run: |
          mkdir -p gh-pages
          cp .cr-release-packages/*.tgz gh-pages/
          cp deploy/helm/klyster/pages/index.html gh-pages/index.html
          cd gh-pages
          helm repo index . --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }} --merge index.yaml

      - name: Publish Helm repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages
          publish_branch: gh-pages
          keep_files: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Helm repository as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages

      - name: Deploy Helm repository to GitHub Pages
        id: pages-deployment
        uses: actions/deploy-pages@v4
