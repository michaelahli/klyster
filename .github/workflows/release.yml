name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Binary - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: klyster
            asset_name: klyster-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: klyster
            asset_name: klyster-darwin-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install protobuf compiler
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install protobuf
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}

      - name: Generate checksum
        run: shasum -a 256 ./${{ matrix.asset_name }} > ./${{ matrix.asset_name }}.sha256

      - name: Generate release notes
        if: matrix.os == 'ubuntu-latest'
        run: scripts/generate-changelog.sh "${{ github.ref_name }}" > RELEASE_NOTES.md

      - name: Upload Release Asset
        if: matrix.os != 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./${{ matrix.asset_name }}
            ./${{ matrix.asset_name }}.sha256
          draft: false
          prerelease: false

      - name: Upload Release Asset and Notes
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./${{ matrix.asset_name }}
            ./${{ matrix.asset_name }}.sha256
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
