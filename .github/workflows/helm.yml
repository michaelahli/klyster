name: Helm Chart

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/helm.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'deploy/helm/**'
      - '.github/workflows/helm.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint and Render Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Lint chart
        run: helm lint deploy/helm/klyster

      - name: Render default values
        run: helm template klyster deploy/helm/klyster --namespace klyster

      - name: Render production values
        run: helm template klyster deploy/helm/klyster --namespace klyster -f deploy/helm/klyster/values-prod.yaml
