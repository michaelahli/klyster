{{- if eq .Values.database.type "postgres" }}
{{- $internal := .Values.database.postgres.internal.enabled -}}
{{- $existingSecret := "" -}}
{{- $password := "" -}}
{{- if $internal -}}
{{- $existingSecret = .Values.database.postgres.internal.auth.existingSecret -}}
{{- $password = .Values.database.postgres.internal.auth.password -}}
{{- else -}}
{{- $existingSecret = .Values.database.postgres.external.existingSecret -}}
{{- $password = .Values.database.postgres.external.password -}}
{{- end -}}
{{- if not $existingSecret }}
{{- $username := include "klyster.postgresUsername" . -}}
{{- $database := include "klyster.postgresDatabase" . -}}
{{- $host := include "klyster.postgresHost" . -}}
{{- $port := include "klyster.postgresPort" . | trim -}}
{{- $sslMode := include "klyster.postgresSslMode" . | trim -}}
{{- $generatedPassword := randAlphaNum 24 -}}
{{- $resolvedPassword := default $generatedPassword $password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "klyster.postgresSecretName" . }}
  labels:
    {{- include "klyster.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "klyster.postgresPasswordKey" . }}: {{ $resolvedPassword | quote }}
  {{ include "klyster.postgresUrlKey" . }}: {{ printf "postgresql://%s:%s@%s:%s/%s?sslmode=%s" $username $resolvedPassword $host $port $database $sslMode | quote }}
{{- end }}
{{- end }}
